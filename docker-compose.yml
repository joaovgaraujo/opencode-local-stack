# Dockerized llama.cpp CUDA server (TurboQuant-capable fork) for this stack.
#
# Image: built from the fork joaovgaraujo/llama-cpp-turboquant (branch
# feature/turboquant-kv-cache) by its "Publish CUDA server image to GHCR"
# workflow. Base: nvidia/cuda 13.3.0 on Ubuntu 26.04 (GeForce Ada sm_89).
# Includes the turbo4 V-cache decode fix (#207). Requires the NVIDIA
# container toolkit on the host.
#
#   docker compose up -d
#   curl http://127.0.0.1:8080/health
#
# Serving config mirrors the validated bare-metal run (see RESULTS.md):
# Qwen3.6-35B-A3B Q4_K_M, all MoE experts on CPU, q8_0 K/V cache.
#
# KV-cache note (measured on this machine): this image carries the turbo4
# decode fix, so `--cache-type-v turbo4` now works correctly - verified passing
# the OpenCode agentic test in 47 s. turbo4 gives NO decode-speed gain (it is a
# touch slower at depth); its only benefit is fitting MORE context in the same
# VRAM. Use q8_0 (below) for best speed; switch V to `turbo4` only when you
# need maximum context on a small card. Do NOT use `turbo3` for coding - it has
# genuine 3-bit quality loss (failed code-gen validation). See docs/DOCKER.md.
services:
  llama-server:
    image: ghcr.io/joaovgaraujo/llama-cpp-turboquant:server-cuda
    gpus: all
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./models:/models:ro
    command: >
      -m /models/Qwen3.6-35B-A3B-UD-Q4_K_M.gguf
      --alias qwen3.6-35b-a3b
      --ctx-size 65536
      --flash-attn on
      --jinja
      --n-gpu-layers 999
      --cpu-moe
      --cache-type-k q8_0
      --cache-type-v q8_0
      --host 0.0.0.0
      --port 8080
    restart: unless-stopped
