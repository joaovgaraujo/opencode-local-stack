# Dockerized llama.cpp CUDA server (TurboQuant-capable fork) for this stack.
#
# Image: built from the fork joaovgaraujo/llama-cpp-turboquant (branch
# feature/turboquant-kv-cache, upstream TheTom revision c26cbdf) by its
# "Publish CUDA server image to GHCR" workflow. Requires the NVIDIA
# container toolkit on the host.
#
#   docker compose up -d
#   curl http://127.0.0.1:8080/health
#
# Serving config mirrors the validated bare-metal run (see RESULTS.md):
# Qwen3.6-35B-A3B Q4_K_M, all MoE experts on CPU, q8_0 K/V cache.
#
# KV-cache warning (measured on this machine, 2026-07-23): TurboQuant V-cache
# looks fine in llama-bench and one-shot validations, but breaks agentic use -
# turbo3 failed code-gen validation twice, and turbo4 made the reasoning model
# spiral past the OpenCode smoke-test timeout 4/4 times (q8_0 passed in 48 s).
# Swap `q8_0` for `turbo4` on --cache-type-v below only for non-agentic,
# long-context workloads where the small VRAM saving matters.
services:
  llama-server:
    image: ghcr.io/joaovgaraujo/llama-cpp-turboquant:server-cuda
    gpus: all
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./models:/models:ro
    command: >
      -m /models/Qwen3.6-35B-A3B-UD-Q4_K_M.gguf
      --alias qwen3.6-35b-a3b
      --ctx-size 65536
      --flash-attn on
      --jinja
      --n-gpu-layers 999
      --cpu-moe
      --cache-type-k q8_0
      --cache-type-v q8_0
      --host 0.0.0.0
      --port 8080
    restart: unless-stopped
